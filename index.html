<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Snake</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <div class="window">
        <div class="topbar">
          <h1>Snake</h1>
          <div class="window-buttons">
            <div class="window-button minimize-button"><div>🗕</div></div>
            <div class="window-button maximize-button"><div>🗖</div></div>
            <div class="window-button close-button">
              <!-- I didn't find a satisfying xmark character so I simulated one -->
              <div style="transform: translate(-7%) rotate(45deg) scale(1.5)">
                <div>🞤</div>
              </div>
            </div>
          </div>
        </div>
        <aside class="info-bar">
          <div class="score-container">
            <div class="food"></div>
            <div class="score">0</div>
          </div>
          <div class="instructions">Use 🠈, 🠉, 🠊 & 🠋 to move</div>
        </aside>
        <main class="grid-container"></main>
      </div>
    </div>
  </body>
</html>
